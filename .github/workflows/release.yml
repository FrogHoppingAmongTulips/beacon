name: release

# Собирает бинарники и публикует релиз при пуше тега вида v1.2.3
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: make dist VERSION=${{ github.ref_name }}

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/beacon-linux-amd64
            dist/beacon-linux-arm64
            dist/checksums.txt
            dist/install.sh
