<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<title>beacon — control center</title>
<style>
  :root{
    --bg:#000; --line:#1c1c1c; --line2:#2c2c2c; --ink:#fff; --mut:#8a8a8a; --faint:#565656;
    --sans:-apple-system,system-ui,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);}
  body{font-family:var(--sans);-webkit-font-smoothing:antialiased;font-weight:300;}
  .wrap{margin:0;min-height:100vh;display:flex;flex-direction:column;}
  #home{flex:1;display:flex;}
  .up{text-transform:uppercase;letter-spacing:.16em;}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums;}
  .hidden{display:none!important}
  button{font-family:inherit}

  .top{display:flex;align-items:center;gap:16px;padding:20px 26px;border-bottom:1px solid var(--line);}
  .top .word{font-size:15px;letter-spacing:.28em;font-weight:300;}
  .top .sp{flex:1}
  .top .stat{display:flex;align-items:center;gap:9px;font-size:11px;color:var(--mut);letter-spacing:.14em;}
  .dot{width:7px;height:7px;border-radius:50%;background:#fff;box-shadow:0 0 0 0 rgba(255,255,255,.5);animation:pl 2.6s infinite;}
  @keyframes pl{0%{box-shadow:0 0 0 0 rgba(255,255,255,.35)}100%{box-shadow:0 0 0 7px rgba(255,255,255,0)}}
  .back{display:none;align-items:center;gap:8px;background:none;border:none;color:var(--mut);cursor:pointer;font-size:11px;letter-spacing:.14em;padding:4px;}
  .back:hover{color:#fff}
  .back svg{width:16px;height:16px}

  .grid{flex:1;display:flex;flex-wrap:wrap;align-content:stretch;gap:1px;background:var(--line);}
  .tile{flex:1 1 25%;background:#000;min-height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;cursor:pointer;transition:background .2s;border:none;color:#fff;}
  .tile:hover{background:#0b0b0b}
  .tile svg{width:42px;height:42px;fill:none;stroke:#fff;stroke-width:1.35;stroke-linecap:round;stroke-linejoin:round;}
  .tile .lbl{font-size:11.5px;letter-spacing:.17em;color:var(--mut);text-transform:uppercase;transition:color .2s;}
  .tile:hover .lbl{color:#fff}

  .section{display:none}
  .sec-head{display:flex;align-items:center;gap:16px;padding:22px 26px;border-bottom:1px solid var(--line);}
  .sec-head .t{font-size:13px;letter-spacing:.18em;text-transform:uppercase;}
  .sec-head .idx{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--faint);}
  .sec-body{padding:26px;}
  .lede{font-size:13px;color:var(--mut);line-height:1.7;max-width:60ch;margin:0 0 26px;font-weight:300;}

  .rows{border-top:1px solid var(--line);}
  .row{display:flex;align-items:center;justify-content:space-between;padding:15px 2px;border-bottom:1px solid var(--line);gap:16px;}
  .row .k{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);}
  .row .v{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:14px;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60%}
  .row .v.dim{color:var(--faint)}

  .cluster{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1px;background:var(--line);border:1px solid var(--line);margin-bottom:26px;}
  .cell{background:#000;padding:20px;}
  .cell .k{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);}
  .cell .n{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:30px;font-weight:300;margin-top:12px;letter-spacing:-.01em;}
  .cell .n small{font-size:13px;color:var(--faint);}
  .cell .sub{font-family:var(--mono);font-size:10.5px;color:var(--faint);margin-top:8px;}

  .status-line{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
  .status-line .big{font-size:26px;letter-spacing:.06em;font-weight:300;}
  .status-line .dot{width:9px;height:9px}

  .btn{background:transparent;border:1px solid var(--line2);color:#fff;text-transform:uppercase;letter-spacing:.14em;font-size:11px;padding:13px 20px;cursor:pointer;transition:.16s;}
  .btn:hover{border-color:#fff;background:#0d0d0d}
  .btn:disabled{opacity:.5;cursor:default}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px}
  .full{width:100%}

  canvas{display:block;width:100%}
  .chart-box{border:1px solid var(--line);padding:14px;}
  .legend{display:flex;gap:22px;margin-top:14px;font-family:var(--mono);font-size:11px;color:var(--mut);}
  .legend i{display:inline-block;width:14px;height:0;border-top:1.5px solid #fff;vertical-align:middle;margin-right:7px}
  .legend i.dash{border-top-style:dashed}

  .u-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .u-top .c{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.1em}
  .ulist{border-top:1px solid var(--line)}
  .empty{padding:24px 2px;color:var(--faint);font-family:var(--mono);font-size:12px}
  .u{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;padding:14px 2px;border-bottom:1px solid var(--line);}
  .u.off{opacity:.42}
  .ava{width:34px;height:34px;border:1px solid var(--line2);display:grid;place-items:center;font-family:var(--mono);font-size:13px;position:relative}
  .ava .s{position:absolute;right:-3px;bottom:-3px;width:9px;height:9px;border-radius:50%;background:#000;border:1px solid var(--faint)}
  .ava .s.on{background:#fff;border-color:#fff}
  .uname{font-size:14px}
  .umeta{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:3px;display:flex;gap:9px;flex-wrap:wrap}
  .umeta .d{color:var(--mut)}
  .obadge{border:1px solid var(--line2);color:var(--mut);font-size:9.5px;letter-spacing:.1em;padding:0 5px;border-radius:2px}
  .uacts{display:flex;gap:2px;opacity:.5;transition:.15s}
  .u:hover .uacts{opacity:1}
  .uacts button{width:32px;height:32px;background:none;border:1px solid transparent;color:var(--mut);cursor:pointer;display:grid;place-items:center}
  .uacts button:hover{color:#fff;border-color:var(--line2)}
  .uacts svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}

  .logbox{background:#050505;border:1px solid var(--line);height:360px;overflow-y:auto;padding:14px 16px;font-family:var(--mono);font-size:12px;line-height:1.7}
  .logbox .ln{white-space:pre-wrap;color:#bdbdbd;word-break:break-word}
  .logbox .ln .tt{color:var(--faint)}
  .cursor{display:inline-block;width:8px;height:14px;background:#fff;animation:bl 1.1s steps(1) infinite;vertical-align:-2px}
  @keyframes bl{50%{opacity:0}}

  .ov{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;place-items:center;z-index:50;padding:20px}
  .ov.open{display:grid}
  .modal{width:min(400px,100%);background:#000;border:1px solid var(--line2);animation:ri .25s ease}
  @keyframes ri{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .mhead{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--line)}
  .mhead .t{font-size:12px;letter-spacing:.16em;text-transform:uppercase}
  .mhead button{background:none;border:none;color:var(--mut);cursor:pointer}
  .mbody{padding:22px 20px;display:flex;flex-direction:column;gap:16px;align-items:center}
  .qr{background:#fff;padding:12px}
  .qr canvas,.qr img{width:184px;height:184px;image-rendering:pixelated;display:block}
  .field{width:100%;background:#0a0a0a;border:1px solid var(--line2);color:#fff;padding:11px 13px;font-family:inherit;font-size:14px;outline:none}
  .field:focus{border-color:#fff}
  .flabel{width:100%;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);margin-bottom:-8px}
  .linkrow{width:100%;display:flex;gap:8px;border:1px solid var(--line);padding:9px 9px 9px 12px;align-items:center}
  .linkrow code{font-family:var(--mono);font-size:11px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .hint{font-family:var(--mono);font-size:10.5px;color:var(--faint);text-align:center;line-height:1.6}
  .err{color:#fff;font-family:var(--mono);font-size:11px;min-height:15px;text-align:center}

  .login-box{width:min(340px,100%);border:1px solid var(--line2);background:#000;padding:34px 28px}
  .login-box .word{text-align:center;font-size:20px;letter-spacing:.34em;margin-bottom:6px}
  .login-box .cap{text-align:center;font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.14em;margin-bottom:26px}

  @media (max-width:820px){ .tile{flex-basis:50%} }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<div class="wrap">
  <div class="top">
    <button class="back" id="back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>НАЗАД</button>
    <div class="word">BEACON</div>
    <div class="sp"></div>
    <div class="stat" id="topStat"><span class="dot"></span><span id="topHost">В СЕТИ</span></div>
  </div>

  <div id="home"><div class="grid" id="grid"></div></div>

  <div class="section" id="section">
    <div class="sec-head"><div class="t" id="secTitle">—</div><div class="idx" id="secIdx"></div></div>
    <div class="sec-body" id="secBody"></div>
  </div>
</div>

<!-- LOGIN -->
<div class="ov" id="loginOv">
  <div class="login-box">
    <div class="word up">BEACON</div>
    <div class="cap">ВХОД В ПАНЕЛЬ</div>
    <form id="loginForm" style="display:flex;flex-direction:column;gap:14px">
      <input class="field" id="pw" type="password" placeholder="Пароль" autocomplete="current-password" autofocus>
      <div class="err" id="loginErr"></div>
      <button class="btn full" type="submit">ВОЙТИ</button>
    </form>
  </div>
</div>

<!-- QR -->
<div class="ov" id="qrOv">
  <div class="modal">
    <div class="mhead"><div class="t" id="qrTitle">КЛЮЧ</div><button data-close="qrOv"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M6 6l12 12M18 6L6 18"/></svg></button></div>
    <div class="mbody">
      <div class="qr"><img id="qrImg" alt="QR" class="hidden"><canvas id="qrC" width="184" height="184"></canvas></div>
      <div class="linkrow"><code id="qrLink">vless://…</code><button class="btn" style="padding:8px 12px" id="qrCopy">КОПИЯ</button></div>
      <div class="btn-row" id="qrDlRow" style="display:none"><button class="btn full" id="qrDl">СКАЧАТЬ .CONF</button></div>
      <div class="hint" id="qrHint">СКАНИРУЙ В v2rayNG / STREISAND / HIDDIFY</div>
    </div>
  </div>
</div>

<!-- ADD / EDIT -->
<div class="ov" id="addOv">
  <div class="modal">
    <div class="mhead"><div class="t" id="addTitle">НОВЫЙ КЛЮЧ</div><button data-close="addOv"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M6 6l12 12M18 6L6 18"/></svg></button></div>
    <div class="mbody" style="align-items:stretch">
      <div class="flabel">Имя</div><input class="field" id="fName" placeholder="Например: Артём">
      <button class="btn full" id="fSave" style="margin-top:6px">СОЗДАТЬ КЛЮЧ</button>
    </div>
  </div>
</div>

<!-- PASSWORD -->
<div class="ov" id="pwOv">
  <div class="modal">
    <div class="mhead"><div class="t">СМЕНА ПАРОЛЯ</div><button data-close="pwOv"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M6 6l12 12M18 6L6 18"/></svg></button></div>
    <div class="mbody" style="align-items:stretch">
      <div class="flabel">Новый пароль (мин. 6)</div><input class="field" id="npw" type="password" placeholder="••••••">
      <div class="err" id="pwErr"></div>
      <button class="btn full" id="pwSave">СОХРАНИТЬ</button>
    </div>
  </div>
</div>

<script>
(() => {
  const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  const GB=1024**3;
  const state={demo:false,users:[],editing:null,curLink:'',curId:'',metricsES:null,logsES:null,demoTimer:null,logTimer:null,revealIP:false};
  let INFO={};
  const M={cpu:0,ram:0,ramT:0,dn:0,up:0,uptSec:0,load1:0};
  const dnArr=[],upArr=[],MAX=60; for(let i=0;i<MAX;i++){dnArr.push(0);upArr.push(0);}

  /* ---------- API ---------- */
  const j=r=>r.ok?r.json():null;
  const API={
    async session(){const r=await fetch('/api/session');return r.ok?(await r.json()).authenticated:false;},
    async login(pw){const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});return r.ok;},
    async logout(){await fetch('/api/logout',{method:'POST'});},
    async users(){return (await fetch('/api/users').then(j))||[];},
    async add(name){return fetch('/api/users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name})}).then(j);},
    async update(id,patch){return fetch('/api/users/'+encodeURIComponent(id),{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(patch)}).then(j);},
    async del(id){return fetch('/api/users/'+encodeURIComponent(id),{method:'DELETE'});},
    async info(){return (await fetch('/api/info').then(j))||{};},
    async password(pw){return fetch('/api/password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});},
    async masking(sni){return fetch('/api/masking',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sni})}).then(j);},
    async protocol(protocol){const r=await fetch('/api/protocol',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({protocol})});try{return await r.json();}catch(_){return null;}},
  };

  /* ---------- format ---------- */
  const esc=s=>(s==null?'':(''+s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const fmtB=b=>{if(!b)return'0 Б';const u=['Б','КБ','МБ','ГБ','ТБ'];let i=0,n=b;while(n>=1024&&i<4){n/=1024;i++}return (i?n.toFixed(1):n)+' '+u[i]};
  const fmtMbps=v=>v<10?v.toFixed(1):Math.round(v);
  const fmtUpt=s=>{if(!s)return'—';const d=Math.floor(s/86400),h=Math.floor(s%86400/3600);return (d?d+'д ':'')+String(h).padStart(2,'0')+'ч'};
  const ago=iso=>{if(!iso)return'не подключался';const t=new Date(iso).getTime();if(!t||new Date(iso).getFullYear()<2000)return'—';const s=(Date.now()-t)/1000;if(s<60)return Math.round(s)+' сек назад';if(s<3600)return Math.round(s/60)+' мин назад';if(s<86400)return Math.round(s/3600)+' ч назад';return Math.round(s/86400)+' дн назад'};
  const rows=arr=>`<div class="rows">${arr.map(([k,v,dim])=>`<div class="row"><span class="k">${k}</span><span class="v ${dim?'dim':''}">${v}</span></div>`).join('')}</div>`;
  const onlineN=()=>state.users.filter(u=>u.online).length;
  const trunc=(s,n)=>!s?'—':(s.length>n?s.slice(0,n-1)+'…':s);
  const maskHost=h=>{if(!h)return'—';if(state.revealIP||!/^\d+\.\d+\.\d+\.\d+$/.test(h))return h;return h.split('.')[0]+'.•••.•••.•••';};

  /* ---------- icons + tiles ---------- */
  const ic={
    connection:'<path d="M9.5 14.5l5-5"/><path d="M12 6.5l1-1a3.5 3.5 0 0 1 5 5l-1 1"/><path d="M12 17.5l-1 1a3.5 3.5 0 0 1-5-5l1-1"/>',
    speed:'<path d="M4 16a8 8 0 0 1 16 0"/><path d="M12 16l4.5-3.2"/><circle cx="12" cy="16" r="1.1"/>',
    bandwidth:'<path d="M8 20V5"/><path d="M4.5 8.5L8 5l3.5 3.5"/><path d="M16 4v15"/><path d="M12.5 15.5L16 19l3.5-3.5"/>',
    usage:'<circle cx="12" cy="12" r="8"/><path d="M12 12V4"/><path d="M12 12l6.5 3.4"/>',
    users:'<circle cx="9" cy="8.5" r="3"/><path d="M3.5 19a5.5 5.5 0 0 1 11 0"/><path d="M16 6.2a3 3 0 0 1 0 5.6"/><path d="M17.5 13.5a5.5 5.5 0 0 1 3 5"/>',
    servers:'<rect x="4" y="4" width="16" height="5" rx="1"/><rect x="4" y="11" width="16" height="5" rx="1"/><circle cx="7.5" cy="6.5" r=".6"/><circle cx="7.5" cy="13.5" r=".6"/><path d="M11 18.5h9"/>',
    ipdns:'<circle cx="12" cy="12" r="8.5"/><path d="M3.5 12h17"/><path d="M12 3.5c2.8 2.5 2.8 14.5 0 17M12 3.5c-2.8 2.5-2.8 14.5 0 17"/>',
    security:'<path d="M12 3.5l7 2.6v5.1c0 4.2-3 7-7 8.8-4-1.8-7-4.6-7-8.8V6.1z"/><path d="M9.3 12l1.9 1.9 3.5-3.8"/>',
    logs:'<rect x="3.5" y="4.5" width="17" height="15" rx="2"/><path d="M7.5 10l3 2.5-3 2.5"/><path d="M12.5 15h4.5"/>',
    settings:'<path d="M4 8h9"/><path d="M17 8h3"/><circle cx="15" cy="8" r="2.1"/><path d="M4 16h4"/><path d="M12 16h8"/><circle cx="10" cy="16" r="2.1"/>',
    about:'<circle cx="12" cy="12" r="8.5"/><path d="M12 11v5.2"/><circle cx="12" cy="7.8" r=".7" fill="currentColor" stroke="none"/>',
  };
  const tiles=[['connection','CONNECTION'],['speed','SPEED'],['bandwidth','BANDWIDTH'],['usage','USAGE'],['users','USERS'],['servers','SERVERS'],['ipdns','IP & DNS'],['security','SECURITY'],['logs','LOGS'],['settings','SETTINGS'],['about','ABOUT']];
  $('#grid').innerHTML=tiles.map(([k,l])=>`<button class="tile" data-k="${k}"><svg viewBox="0 0 24 24">${ic[k]}</svg><span class="lbl">${l}</span></button>`).join('');
  $$('.tile').forEach(t=>t.addEventListener('click',()=>openSection(t.dataset.k)));

  /* ---------- router ---------- */
  let current=null;
  function stopLive(){ if(state.logsES){state.logsES.close();state.logsES=null;} if(state.logTimer){clearInterval(state.logTimer);state.logTimer=null;} }
  function openSection(k){
    stopLive(); current=k;
    const idx=tiles.findIndex(t=>t[0]===k)+1;
    $('#secTitle').textContent=tiles.find(t=>t[0]===k)[1];
    $('#secIdx').textContent=String(idx).padStart(2,'0')+' / '+tiles.length;
    $('#secBody').innerHTML=render[k]?render[k]():'<p class="lede">Раздел в разработке.</p>';
    $('#home').style.display='none'; $('#section').style.display='block'; $('#back').style.display='flex';
    window.scrollTo(0,0);
    if(after[k])after[k]();
  }
  function goHome(){ stopLive(); current=null; $('#section').style.display='none'; $('#home').style.display=''; $('#back').style.display='none'; }
  $('#back').addEventListener('click',goHome);

  /* ---------- sections ---------- */
  const protoName=()=>INFO.protocol==='amneziawg'?'AmneziaWG':'VLESS + Reality';
  const render={
    connection:()=>`
      <div class="status-line"><span class="dot" style="width:9px;height:9px"></span><span class="big">В СЕТИ</span></div>
      <p class="lede">Сервер ${esc(maskHost(INFO.host))} принимает подключения. Протокол ${protoName()}${INFO.protocol==='amneziawg'?'':', маскировка под '+esc(INFO.sni||'—')}.</p>
      ${rows([['Аптайм','<span id="r-upt">'+fmtUpt(M.uptSec)+'</span>'],['Активных клиентов','<span id="r-cl">'+onlineN()+' / '+state.users.length+'</span>'],['Внешний адрес',esc(maskHost(INFO.host))+':'+(INFO.vpn_port||443)],['TLS панели',esc(INFO.tls||'self-signed')]])}
      <div class="cluster" style="margin-top:26px">
        <div class="cell"><div class="k">CPU</div><div class="n" id="r-cpu">${Math.round(M.cpu)}<small>%</small></div><div class="sub">load ${(M.load1||0).toFixed(2)}</div></div>
        <div class="cell"><div class="k">RAM</div><div class="n" id="r-ram">${M.ramT?M.ram.toFixed(1):'0'}<small>/${(M.ramT||0).toFixed(1)} ГБ</small></div></div>
        <div class="cell"><div class="k">↓ загрузка</div><div class="n" id="r-dn">${fmtMbps(M.dn)}<small>Mbps</small></div></div>
        <div class="cell"><div class="k">↑ отдача</div><div class="n" id="r-up">${fmtMbps(M.up)}<small>Mbps</small></div></div>
      </div>`,
    speed:()=>`
      <p class="lede">Реальный замер через сервер: скачивание/отдача тестовых данных и пинг.</p>
      <div class="cluster">
        <div class="cell"><div class="k">Download</div><div class="n" id="s-dn">—<small>Mbps</small></div></div>

  function drawQR(){
    const c=$('#qrC'),x=c.getContext('2d'),N=29,cell=c.width/N;let s=(Date.now()>>4)&0x7fffffff;
    const rnd=()=>(s=(s*1103515245+12345)&0x7fffffff)/0x7fffffff;
    x.fillStyle='#fff';x.fillRect(0,0,c.width,c.height);x.fillStyle='#000';
    for(let y=0;y<N;y++)for(let xx=0;xx<N;xx++)if(rnd()>.5)x.fillRect(xx*cell,y*cell,cell,cell);
    const f=(ox,oy)=>{x.fillStyle='#fff';x.fillRect(ox*cell,oy*cell,7*cell,7*cell);x.fillStyle='#000';x.fillRect(ox*cell,oy*cell,7*cell,cell);x.fillRect(ox*cell,(oy+6)*cell,7*cell,cell);x.fillRect(ox*cell,oy*cell,cell,7*cell);x.fillRect((ox+6)*cell,oy*cell,cell,7*cell);x.fillRect((ox+2)*cell,(oy+2)*cell,3*cell,3*cell);};
    f(0,0);f(N-7,0);f(0,N-7);
  }

  /* ---------- charts ---------- */
  function drawBW(){
    const c=$('#bwC'); if(!c)return; const ctx=c.getContext('2d');
    const dpr=Math.min(devicePixelRatio||1,2),w=c.clientWidth,h=150;
    c.width=w*dpr;c.height=h*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,w,h);
    const pad=4,top=8,bot=h-6,peak=Math.max(10,...dnArr,...upArr)*1.15;
    ctx.strokeStyle='#161616';ctx.lineWidth=1;
    for(let g=0;g<=3;g++){const y=top+(bot-top)*g/3;ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(w-pad,y);ctx.stroke();}
    const px=i=>pad+(w-2*pad)*i/(MAX-1),py=v=>top+(bot-top)*(1-v/peak);
    ctx.beginPath();ctx.moveTo(px(0),py(dnArr[0]));for(let i=1;i<MAX;i++)ctx.lineTo(px(i),py(dnArr[i]));ctx.lineTo(px(MAX-1),bot);ctx.lineTo(px(0),bot);ctx.closePath();
    const g=ctx.createLinearGradient(0,top,0,bot);g.addColorStop(0,'rgba(255,255,255,.14)');g.addColorStop(1,'rgba(255,255,255,0)');ctx.fillStyle=g;ctx.fill();
    const line=(arr,dash)=>{ctx.beginPath();ctx.setLineDash(dash?[4,4]:[]);ctx.moveTo(px(0),py(arr[0]));for(let i=1;i<arr.length;i++)ctx.lineTo(px(i),py(arr[i]));ctx.strokeStyle='#fff';ctx.lineWidth=dash?1.2:1.7;ctx.stroke();ctx.setLineDash([]);};
    line(upArr,true);line(dnArr,false);
  }

  /* ---------- speed (настоящий замер через сервер) ---------- */
  function setMbps(id,v){const el=$(id);if(el)el.innerHTML=fmtMbps(v)+'<small>Mbps</small>';}
  function setStage(t){const el=$('#s-stage');if(el)el.textContent=t;}

  async function measurePing(n){
    let best=Infinity;
    for(let i=0;i<n;i++){
      const t0=performance.now();
      try{await fetch('/api/info',{cache:'no-store'});}catch(_){return null;}
      best=Math.min(best,performance.now()-t0);
    }
    return best;
  }

  // читаем поток чанками и обновляем Mbps в реальном времени — плавная живая анимация вместо рывка в конце
  async function measureDown(bytes,onTick){
    const t0=performance.now();
    const r=await fetch('/api/speedtest/down?bytes='+bytes,{cache:'no-store'});
    if(!r.ok||!r.body)throw new Error('down failed');
    const reader=r.body.getReader();let got=0;
    for(;;){
      const {done,value}=await reader.read();
      if(done)break;
      got+=value.length;
      const sec=(performance.now()-t0)/1000;
      if(sec>0.05)onTick(got*8/1e6/sec);
    }
    const sec=(performance.now()-t0)/1000;
    return got*8/1e6/sec;
  }

  // XHR даёт upload.onprogress — у fetch нет колбэка прогресса отправки тела
  function measureUp(bytes,onTick){
    return new Promise((resolve,reject)=>{
      const data=new Uint8Array(bytes);crypto.getRandomValues(data.subarray(0,Math.min(bytes,65536)));
      const xhr=new XMLHttpRequest();const t0=performance.now();
      xhr.open('POST','/api/speedtest/up');
      xhr.upload.onprogress=e=>{const sec=(performance.now()-t0)/1000;if(sec>0.05)onTick(e.loaded*8/1e6/sec);};
      xhr.onload=()=>{const sec=(performance.now()-t0)/1000;resolve(bytes*8/1e6/sec);};
      xhr.onerror=()=>reject(new Error('up failed'));
      xhr.send(data);
    });
  }

  let speedRunning=false;
  async function runSpeed(){
    if(speedRunning)return; speedRunning=true;
    const b=$('#s-run');b.textContent='ИДЁТ ТЕСТ…';b.disabled=true;
    $('#s-dn').innerHTML='—<small>Mbps</small>';$('#s-up').innerHTML='—<small>Mbps</small>';$('#s-pg').innerHTML='—<small>ms</small>';
    if(state.demo){
      setStage('Демо-режим — эмуляция (нет сервера)');
      for(const [id,lo,hi,delay] of [['#s-pg',6,18,300],['#s-dn',180,420,900],['#s-up',40,140,900]]){
        await new Promise(r=>setTimeout(r,delay));
        const v=lo+Math.random()*(hi-lo);
        $(id).innerHTML=(id==='#s-pg'?v.toFixed(0):fmtMbps(v))+'<small>'+(id==='#s-pg'?'ms':'Mbps')+'</small>';
      }
      setStage('Готово (демо)');speedRunning=false;b.textContent='ЗАПУСТИТЬ ТЕСТ';b.disabled=false;return;
    }
    try{
      setStage('Пинг…');
      const pg=await measurePing(5);
      if(pg!=null)$('#s-pg').innerHTML=pg.toFixed(0)+'<small>ms</small>';

      setStage('Скачивание…');
      const dn=await measureDown(16*1024*1024,v=>setMbps('#s-dn',v));
      setMbps('#s-dn',dn);

      setStage('Отдача…');
      const up=await measureUp(6*1024*1024,v=>setMbps('#s-up',v));
      setMbps('#s-up',up);

      setStage('Готово');
    }catch(_){
      setStage('Тест не удался — сервер недоступен');
    }finally{
      speedRunning=false;b.textContent='ЗАПУСТИТЬ ТЕСТ';b.disabled=false;
    }
  }

  /* ---------- live metrics ---------- */
  function applyMetrics(m){

    dnArr.push(M.dn);dnArr.shift();upArr.push(M.up);upArr.shift();

  function set(id,v){const e=$(id);if(e)e.innerHTML=v;}
  function refreshLive(){

      set('#r-ram',(M.ramT?M.ram.toFixed(1):'0')+'<small>/'+(M.ramT||0).toFixed(1)+' ГБ</small>');
      set('#r-dn',fmtMbps(M.dn)+'<small>Mbps</small>');set('#r-up',fmtMbps(M.up)+'<small>Mbps</small>');
      set('#r-cl',onlineN()+' / '+state.users.length);
    }
    if(current==='bandwidth'){drawBW();set('#bw-dn',fmtMbps(M.dn));set('#bw-up',fmtMbps(M.up));}
  }
  function connectMetrics(){try{state.metricsES=new EventSource('/api/stream');state.metricsES.onmessage=e=>{try{applyMetrics(JSON.parse(e.data))}catch(_){}};}catch(_){}}

  /* ---------- boot ---------- */
  function setTop(){const h=maskHost(INFO.host||location.hostname||'').toUpperCase();$('#topHost').textContent=h&&h!=='—'?('В СЕТИ · '+h):'В СЕТИ';}
  async function startApp(){
    $('#loginOv').classList.remove('open');
    if(state.demo){INFO={version:'demo',host:'demo-host',vpn_port:443,listen:':8443',sni:'www.microsoft.com',dest:'www.microsoft.com:443',fingerprint:'chrome',public_key:'12R6C36yvy7w_jO6dZHnRx',short_ids:['268abbed4aed34fc'],tls:'self-signed'};state.users=demoUsers();startDemo();setTop();return;}
    INFO=await API.info().catch(()=>({}));
    state.users=await API.users().catch(()=>[]);
    setTop(); connectMetrics();
    setInterval(async()=>{if(!state.demo){state.users=await API.users().catch(()=>state.users);if(current==='users')renderUsers();refreshLive();}},15000);
  }
  function demoUsers(){return[
    {id:'a1',name:'Артём',device:'iPhone 15',enabled:true,online:true,bytes_up:1.1*GB,bytes_down:3.1*GB,last_seen:new Date(Date.now()-12000).toISOString(),link:'vless://a1@demo:443#Артём'},
    {id:'a2',name:'MacBook Air',device:'macOS',enabled:true,online:true,bytes_up:6*GB,bytes_down:12.6*GB,last_seen:new Date(Date.now()-60000).toISOString(),link:'vless://a2@demo:443#MacBook'},
    {id:'a3',name:'Даша',device:'Android',enabled:false,online:false,bytes_up:.2*GB,bytes_down:.62*GB,last_seen:new Date(Date.now()-10800000).toISOString(),link:'vless://a3@demo:443#Даша'},
    {id:'a4',name:'Роутер',device:'OpenWrt',enabled:true,online:true,bytes_up:9*GB,bytes_down:52*GB,last_seen:new Date().toISOString(),link:'vless://a4@demo:443#Router'},
  ];}
  function startDemo(){
    let dc=48,uc=12,upt=12*86400+4*3600;
    const tick=()=>{dc=Math.max(6,Math.min(90,dc+(Math.random()-.5)*18));uc=Math.max(3,Math.min(40,uc+(Math.random()-.5)*8));upt+=1.5;applyMetrics({cpu:8+(Math.random()*22|0),mem_used:.9*GB,mem_total:2*GB,net_rx_bps:dc*1e6/8,net_tx_bps:uc*1e6/8,load1:0.21,uptime_sec:Math.round(upt)});};
    tick(); if(!reduce)state.demoTimer=setInterval(tick,1500);
  }

  async function doLogout(){ if(!state.demo)await API.logout(); location.reload(); }
  $('#loginForm').addEventListener('submit',async e=>{e.preventDefault();const ok=await API.login($('#pw').value);if(ok){startApp();}else{$('#loginErr').textContent='Неверный пароль';$('#pw').select();}});

  window.addEventListener('resize',()=>{if(current==='bandwidth')drawBW();});

  (async()=>{
    try{ const a=await API.session(); if(a)startApp(); else $('#loginOv').classList.add('open'); }
    catch(_){ state.demo=true; startApp(); }
  })();
})();
</script>
